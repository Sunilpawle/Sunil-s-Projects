<!DOCTYPE html>
<html lang="en">

<head>

    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="apply_box">
            <h1>Job Application
                <span class="title_small">(Web) </span>
            </h1>
            <form action="">
                <div class="form_container">
                    <div class="form_control">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name='first_name' placeholder="Enter first Name">
                    </div>
                    <div class="form_control">
                        <label for="last_name">Last_Name</label>
                        <input type="text" id="last_name" name='last_name' placeholder="Enter last Name">
                    </div>
                    <div class="form_control">
                        <label for="email">Email</label>
                        <input type="text" id="email" placeholder="Enter Email">
                    </div>
                    <div class="form_control">
                        <label for="job_role">Select Job Role</label>
                        <select name="job_role" id="job_role">
                            <option value="">>Select job_role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Devloper</option>
                            <option value="fullstack">Fullstack Devleoper</option>
                            <option value="ui_ux">UI UX Desinger</option>
                        </select>
                    </div>
                    <div class="form_control">


                        <label for="Address">Address</label>
                        <textarea name="" id="Address" rows="4" cols="20" placeholder="Enter Address"></textarea>
                    </div>
                    <div class="form_control">
                        <label for="City">City</label>
                        <input type="text" id="City" placeholder="Enter City Name">
                    </div>
                    <div class="form_control">
                        <label for="PinCode">PinCode</label>
                        <input type="number" id="PinCode" placeholder=" Enter pincode">
                    </div>
                    <div class="form_control">
                        <label for="date">Date</label>
                        <input type="date" id="date">
                    </div>
                    <div class="form_control">
                        <label for="upload">Upload Your CV</label>
                        <input type="file" id="upload">
                    </div>
                    <div class="button_container">
                        <button type="submit">Apply Now</button>
                    </div>
                </div>
            </form>

        </div>

    </div>

</body>

</html>
