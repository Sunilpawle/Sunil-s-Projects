<!DOCTYPE html>
<html lang="en">

<head>
    <title>Flex Container & Items</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
            background: #f7f7f7;

        }

        .flex-box {
            display: flex;
            background: white;
            border: 2px solid #ddd;
            padding: 20px;
            border-radius: 20px;
        }

        .item {
            background-color: lightblue;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
            text-align: center;
            flex: 1;

        }
    </style>
</head>

<body>
    <h1>Flex Container & Items (display:flex)</h1>
    <div class="flex-box">
        <div class="item"> Box1</div>
        <div class="item"> Box2</div>
        <div class="item"> Box3</div>

    </div>

</body>

</html>
