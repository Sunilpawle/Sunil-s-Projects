<!DOCTYPE html>
<html lang="en">

<head>
    <title> Width , Height , Max-min Width, Overflow</title>

    <style>
        .block {
            display: block;
            background-color: lightblue;
            padding: 10px;
            margin: 5px;
        }

        .inline {
            display: inline;
            background-color: lightcoral;
            padding: 10px;
            margin: 5px;
            width: 100px;
            height: 50px;

        }
    </style>
</head>

<body>
    <h2>Display:Block</h2>
    <div class="block">Box1(Block)</div>
    <div class="block">Box2(Block)</div>
    <p>Each block takes the full line , so next move</p>

    <h2>Display:Inline</h2>
    <span class="inline">Word1</span>
    <span class="inline">Word2</span>
    <span class="inline">Word3</span>
    <p>Inline boxes sit side by side </p>

    <h2>Display:Inline-block</h2>
    <div class="inline-block">Word1</div>
    <div class="inline-block">Word2</div>
    <div class="inline-block">Word3</div>
    <p>Inline-block boxes sit next to each other but keep width and height like real boxes </p>



</body>

</html>
