<!DOCTYPE html>
<html lang="en">

<head>
    <title>Registration Form</title>
</head>

<body>
    <form action="UserRegistration ">
        <h1>User Registration Form</h1>
        <hr>
        <h3>Personal Details ------------</h3>
        <label for="name ">FullName
            <input type="text">
        </label></label>
        <br>

        <label for="date">Date of Birth
            <input type="date" id="date">

        </label>
        <br>
        <label for="gender">Gender
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </label>
        <br>
        <hr>
        <h3>Academic Information</h3>
        <label for="subject">Subjects
            <input type="checkbox" id="math" value="math">
            <label for="math">Math</label>
            <input type="checkbox" id="science" value="science">
            <label for="science">Science</label>
            <input type="checkbox" id="english" value="english">
            <label for="english">English</label>
        </label>

        <hr>
        <h3>Contact Information ------------</h3>
        <label for="email">Email
            <input type="email" id="email">

        </label>
        <br>
        <label for="phone">Phone Number
            <input type="tel" id="phone">
        </label>
        <hr>
        <h3>Account Details ------------</h3>
        <label for="username">Username
            <input type="text" id="username">
        </label>
        <br>
        <label for="password">Password
            <input type="password" id="password">
        </label>
        <label for="password">Conform Password
            <input type="password" id="password">
        </label>
        <br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">




    </form>


</body>

</html>
